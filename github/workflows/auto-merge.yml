# Auto-merge: every non-draft PR is queued for merge as soon as the
# required status check (Vercel deployment) turns green.
#
# Without this workflow, each PR would need a manual "Enable auto-merge"
# click in the UI (or `gh pr merge --auto`). With it, the only manual
# step is opening the PR — master's branch protection still blocks the
# actual merge until Vercel's preview deployment passes, so this is
# automation, not a relaxation of the gating.
#
# Token: GITHUB_TOKEN is fine here. The Vercel check is driven by
# Vercel's GitHub App webhook, not by Actions `workflow_run`, so the
# "GITHUB_TOKEN-attributed push doesn't trigger downstream workflows"
# pitfall (which forces TulparLang to use a PAT) does not apply.

name: Auto-merge

on:
  pull_request:
    types: [opened, reopened, ready_for_review, synchronize]

permissions:
  contents: write
  pull-requests: write

jobs:
  enable-auto-merge:
    # Skip drafts (still WIP) and PRs from forks. GitHub strips secrets
    # from fork-triggered workflows, and gh needs a writable token to
    # enable auto-merge — fork PRs are reviewed manually by the
    # maintainer and merged after approval.
    if: >-
      github.event.pull_request.draft == false &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Enable auto-merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: gh pr merge "$PR_URL" --auto --merge
